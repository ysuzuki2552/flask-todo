<!DOCTYPE html>
<html>
<head>
<title>ToDo</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>ToDo管理</h1>

{% with messages = get_flashed_messages() %}
{% if messages %}
<ul class="error">
{% for message in messages %}
<li>{{ message }}</li>
{% endfor %}
</ul>
{% endif %}
{% endwith %}

{% block content %}
{% endblock %}

</div>

</body>
</html>
